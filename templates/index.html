<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkbg: '#0B0E14',
                        darkpanel: '#151A23',
                        darkborder: '#232A38',
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554'
                        }
                    }
                }
            } 
        };
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="bg-gray-50 dark:bg-darkbg h-screen flex overflow-hidden antialiased font-sans relative z-0">
    <div class="absolute inset-0 z-[-1] pointer-events-none transition-opacity duration-300 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-50 via-white to-white dark:opacity-0"></div>

    <!-- Mobile header -->
    <div id="mobile-header" class="fixed top-0 left-0 right-0 z-40 bg-white/80 dark:bg-darkpanel/80 backdrop-blur-md border-b border-gray-200/50 dark:border-darkborder/50 px-4 py-3 flex items-center justify-between md:hidden shadow-sm">
        <button id="menu-btn" class="p-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i data-lucide="clock" class="w-5 h-5 text-brand-600 dark:text-brand-500"></i>
            Pi-Schedule
        </h1>
        <button id="mobile-dark-toggle" class="p-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-darkborder rounded-lg transition-colors shadow-sm bg-white dark:bg-darkpanel border border-gray-100 dark:border-darkborder">
            <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
    </div>

    <!-- Floating Mobile Actions Bar -->
    <div id="mobile-actions-bar" class="fixed top-[60px] left-0 right-0 z-30 bg-white/95 dark:bg-darkpanel/95 backdrop-blur-xl border-b border-gray-200/50 dark:border-darkborder/50 px-3 py-2.5 shadow-lg transform -translate-y-[150%] transition-transform duration-300 ease-in-out md:hidden flex flex-col gap-2">
        <div class="flex items-center gap-2 justify-between">
            <button onclick="CalendarView.showScheduleTimeForm()"
                    class="flex-1 py-1.5 bg-gradient-to-r from-purple-500 to-fuchsia-600 active:from-purple-400 active:to-fuchsia-500 text-white rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5 shadow-md shadow-purple-500/20">
                <i data-lucide="timer" class="w-3.5 h-3.5"></i> Schedule
            </button>
            <button onclick="CalendarView.showAddEventForm()"
                    class="flex-1 py-1.5 bg-gradient-to-r from-brand-600 to-indigo-600 active:from-brand-500 active:to-indigo-500 text-white rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5 shadow-md shadow-brand-500/20">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add
            </button>
            <button onclick="CalendarView.showRescheduleAllModal()"
                    class="py-1.5 px-3 bg-gradient-to-r from-amber-500 to-orange-500 active:from-amber-400 active:to-orange-400 text-white rounded-lg text-xs font-semibold flex items-center justify-center shadow-md shadow-amber-500/20"
                    title="Reschedule all">
                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
            </button>
        </div>
        <div class="flex bg-gray-100 dark:bg-darkbg rounded-lg p-1 shadow-inner border border-gray-200/50 dark:border-darkborder/50 justify-between items-center gap-1">
            <button onclick="CalendarView.setMode('month')" class="mobile-mode-btn flex-1 py-1 rounded-md text-xs font-semibold border" data-mode="month">Month</button>
            <button onclick="CalendarView.setMode('week')" class="mobile-mode-btn flex-1 py-1 rounded-md text-xs font-semibold border" data-mode="week">Week</button>
            <button onclick="CalendarView.setMode('day')" class="mobile-mode-btn flex-1 py-1 rounded-md text-xs font-semibold border" data-mode="day">Day</button>
        </div>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden md:hidden transition-opacity" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white/95 dark:bg-darkpanel/95 backdrop-blur-xl border-r border-gray-200/50 dark:border-darkborder/50 flex flex-col shrink-0 fixed md:relative z-40 h-full -translate-x-full md:translate-x-0 transition-transform overflow-y-auto shadow-[4px_0_24px_rgba(0,0,0,0.02)] dark:shadow-[4px_0_24px_rgba(0,0,0,0.2)]">
        <!-- Logo -->
        <div class="p-5 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center shadow-md shadow-brand-500/20">
                <i data-lucide="calendar-clock" class="w-4 h-4 text-white"></i>
            </div>
            <h1 class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 tracking-tight">
                Pi-Schedule
            </h1>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-3 space-y-1">
            <button data-view="tasks"
                    class="nav-btn active w-full text-left px-4 py-2.5 rounded-lg flex items-center gap-3 text-sm font-medium transition-colors">
                <i data-lucide="check-square" class="w-5 h-5"></i>
                Priority Tasks
            </button>
            <button data-view="calendar"
                    class="nav-btn w-full text-left px-4 py-2.5 rounded-lg flex items-center gap-3 text-sm font-medium transition-colors">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                Calendar
            </button>
        </nav>

        <!-- Outlook Calendars -->
        <div id="outlook-calendars-section" class="px-5 py-3 hidden">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Outlook Calendars</h3>
                <button id="refresh-calendars-btn" title="Refresh calendar list"
                        class="p-1 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 rounded transition-colors">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                </button>
            </div>
            <div id="calendar-list" class="space-y-0.5 max-h-48 overflow-y-auto"></div>
        </div>

        <!-- Bottom actions -->
        <div class="p-4 mt-auto mb-2 space-y-3">
            <button id="sync-btn"
                    class="w-full px-4 py-2.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-xl shadow-md shadow-brand-500/20 flex items-center justify-center gap-2 text-sm font-semibold transition-all hover:scale-[1.02] active:scale-[0.98]">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                Sync Outlook
            </button>
            <button id="dark-mode-btn"
                    class="w-full px-4 py-2.5 text-gray-700 dark:text-gray-200 bg-gray-50/50 dark:bg-darkborder/50 hover:bg-gray-100 dark:hover:bg-darkborder border border-gray-200/50 dark:border-darkborder rounded-xl flex items-center justify-center gap-2 text-sm font-medium transition-all">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
                <span class="dark:hidden">Dark Mode</span>
                <span class="hidden dark:inline">Light Mode</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto pt-14 md:pt-0">
        <!-- Task View -->
        <div id="view-tasks" class="p-4 md:p-6"></div>

        <!-- Calendar View -->
        <div id="view-calendar" class="hidden p-4 md:p-6"></div>
    </main>

    <!-- Toast container (stacking) -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col-reverse gap-2 pointer-events-none"></div>

    <!-- Modal backdrop -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-all duration-300">
        <div id="modal-content" class="bg-white/95 dark:bg-darkpanel/95 backdrop-blur-xl border border-white/20 dark:border-darkborder/50 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto transform transition-all duration-300 scale-95 opacity-0"></div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tasks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
